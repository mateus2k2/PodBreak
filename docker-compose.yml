version: "3.9"

services:
  whisperx-api:
    build: .
    ports:
      - "8367:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    environment:
      - gpus=all
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - .:/app

